<script>
/*==================================================================================================
		サブルーチン：文字列
*/
// 引数の文字列を、空白文字と改行を最小限にした1行にする。
function shortenString(inString){
	var newStr = '';
	const spaces = ' \t　\n\r';
	var wasSpace = false;
	for(let i=0; i<inString.length; i++){
		const ch = inString.charAt(i);
		if(spaces.includes(ch)){
			wasSpace = true;
		}else{
			if(wasSpace && newStr.length>0){
				newStr += ' ';
			}
			newStr += ch;
			wasSpace = false;
		}
	}
	return newStr;
}
// 空行を除いても複数行か。
function isMultiLineString(inString){
	const lineArr = inString.split("\n");
	var lineCount = 0;
	for(let i=0; i<inString.length; i++){
		if(lineArr[i].length>0){
			lineCount++;
			if(lineCount>=2){ return true; }
		}
	}
	return false;
}
/*==================================================================================================
		サブルーチン：open
*/
// 自分自身(このページ)を引数のクエリでopen。
function openSelf(inText = null){
	var urlStr = document.URL.split('?').shift();
	if(inText){
		urlStr = urlStr + '?text=' + encodeURIComponent(inText);
	}
	window.open(urlStr,'_top');
}
/*==================================================================================================
		サブルーチン：form要素
*/
// outputLabelのHTMLを設定し、見える位置にスクロール。
function setOutputHTML(inHTMLString){
	const label = document.getElementById('outputLabel');
	label.innerHTML = inHTMLString;
	label.scrollIntoView({behavior:'smooth',block:'center'});
}
// editTextareaの高さを内容に合わせる。
function adjustEditTextareaHeight(){
	const editTextarea = document.editForm.editTextarea;
	editTextarea.style.height = 'auto';//一旦リセット
	editTextarea.style.height = editTextarea.scrollHeight + 'px';
}
// editTextareaの内容を設定。
function setEditTextareaValue(str){
	document.editForm.editTextarea.value = str;
	adjustEditTextareaHeight()
}
/*==================================================================================================
		イベントハンドラ
*/
function handleDOMContentLoaded(event){
	const isMac = (navigator.maxTouchPoints <= 0);
	const editTextarea = document.editForm.editTextarea;
	// 表示内容の調整。
	if(isMac){
		editTextarea.rows = 20;
		// コピー/選択系ボタンは要らないので非表示。
		document.editForm.pasteButton.style.display = 'none';
		document.editForm.copyButton.style.display = 'none';
		document.editForm.selectAllButton.style.display = 'none';
		document.editForm.copyAllButton.style.display = 'none';
		document.getElementById('editButtonsSpace').style.display = 'none';
		//document.getElementById('editButtonsSpace2').style.display = 'none';
		//document.editForm.decreaseEditTextButton.style.display = 'none';
		//document.editForm.increaseEditTextButton.style.display = 'none';
	}else{//iOS
		editTextarea.rows = 5;
		// より狭くしないとスクロールバーが被る。
		editTextarea.style.width = '94%';
	}
}
function handleLoad(event){
	const isMac = (navigator.maxTouchPoints <= 0);
	const editTextarea = document.editForm.editTextarea;
	// クエリ解析。
	const queryArr = document.URL.split('?').pop().split('&');
	var txtVal = null;
	for(let i=0; i<queryArr.length; i++){
		const kvArr = queryArr[i].split('=');
		if(kvArr.length<2){ continue; }
		const keyStr = kvArr[0].toLowerCase();
		const valStr = decodeURIComponent(kvArr[1]);
		if(keyStr=='text'){
			txtVal = valStr;
		}
	}
	// textクエリ指定があれば入れる。
	if(txtVal){
		setEditTextareaValue(txtVal);
		// タイトルにtextを含める。
		document.title = 'ﾏｲﾂ　' + shortenString(txtVal);
		// iOSでtextが複数行の場合、「URLで置き換え」を選択しておく。
		if(!isMac && isMultiLineString(txtVal)){
			document.editForm.operation.value = 'makeURL';
		}
	}
	// editTextareaの高さを内容変更時に合わせる。
	editTextarea.addEventListener('input',adjustEditTextareaHeight);
	// フォーカスをtextareaに。
	editTextarea.focus();
}
/*==================================================================================================
		操作
*/
/*--------------------------------------------------
	選択範囲をコピー
*/
function copySelection(){
	document.editForm.editTextarea.focus();
	document.execCommand('copy');
}
/*--------------------------------------------------
	全てを選択
*/
function selectAll(){
	document.editForm.editTextarea.select();
}
/*--------------------------------------------------
	全てを選択しコピー
*/
function copyAll(){
	selectAll();
	copySelection();
}
/*--------------------------------------------------
	ペースト
*/
function _paste(){
	document.editForm.editTextarea.focus();
	document.execCommand('paste');
}
/*--------------------------------------------------
	クリア
*/
function clearAll(){
	setEditTextareaValue("");
	document.getElementById('outputLabel').innerHTML = "";
	// フォーカスが外れているので戻しておく
	document.editForm.editTextarea.focus();
}
/*--------------------------------------------------
	表示行数の増減
*/
function increaseEditText(){
	var r = document.editForm.editTextarea.rows;
	if(r < 5){ r=5; }else{ r+=5; }
	document.editForm.editTextarea.rows = r;
}
function decreaseEditText(){
	var r = document.editForm.editTextarea.rows - 5;
	if(r < 5){ r=1; }
	document.editForm.editTextarea.rows = r;
}
/*==================================================================================================
		各サイトでの検索
*/
function search(topUrlStr, urlPrefixStr, urlSuffixStr = '', escapeWord = false){
	const txt = document.editForm.editTextarea.value;
	var winName = document.editForm.searchNewTab.checked ? '_blank' : '_top';
	const operation = document.editForm.operation.value;
	const isOpen = operation=='open';
	const isMakeURL = isOpen? false : operation=='makeURL';
	const isMakeLink = (isOpen || isMakeURL)? false : operation=='makeLink';
	// 空ならトップページ。
	if(txt.length <= 0){
		if(isOpen){
			window.open(topUrlStr, winName);
		}else if(isMakeURL){
			openSelf(topUrlStr);
		}else if(isMakeLink){
			setOutputHTML('<br><a href="' + topUrlStr + '" target="' + winName + '">' + topUrlStr + '</a>');
		}
		return;
	}
	// 使用する行だけにする。
	var lineArray = txt.split("\n");
	var wordArray = [];
	for(var i=0; i<lineArray.length; i++){
		if(lineArray[i].length > 0 && !wordArray.includes(lineArray[i])){ wordArray.push(lineArray[i]); }
	}
	// 検索語が複数の場合は常に新規タブ。
	if(wordArray.length > 1){ winName = "_blank"; }
	// 開くorリンク作成。
	var linkHtmlStr = '';
	var urlTxtStr = '';
	for(var i=0; i<wordArray.length; i++){
		var urlStr = urlPrefixStr + (escapeWord ? escape(wordArray[i]) : encodeURIComponent(wordArray[i])) + urlSuffixStr;
		if(isOpen){
			window.open(urlStr,winName);
		}else if(isMakeURL){
			urlTxtStr += urlStr + '\n';
		}else if(isMakeLink){
			linkHtmlStr += '<br><a href="' + urlStr + '" target="' + winName + '">' + wordArray[i] + '</a>';
		}
	}
	if(isMakeURL){
		openSelf(urlTxtStr);
	}else if(isMakeLink){
		setOutputHTML(linkHtmlStr);
	}
}

/*--------------------------------------------------
	URLを開く
*/
function openURLs(){
	// 行単位で分割
	var lineArray = document.editForm.editTextarea.value.split("\n");
	if( lineArray.length <= 0 ){
		return;
	}
	// 各行を補正
	var displayURL = ""; //ユーザ確認表示用文字列
	for( var i=(lineArray.length - 1); 0 <= i; i-- ){
		if(lineArray[i].includes("://")){
			// 5ch表記を修正
			if( lineArray[i].indexOf("ttp:") == 0 ){
				lineArray[i] = "h" + lineArray[i];
			}else if( lineArray[i].indexOf("ttps:") == 0 ){
				lineArray[i] = "h" + lineArray[i];
			}
			// URL表記にエンコード
			// ※ encodeURIComponent() だと「:」や「/」までエンコードしてしまうのでencodeURI
			lineArray[i] = encodeURI( lineArray[i] );
			// displayURLに追加(逆順なので前に追加)
			displayURL = "•" + lineArray[i] + "\n" + displayURL;
		}else{ //それ以外は省く
			lineArray.splice(i,1);
		}
	}
	// ユーザ確認
	if( ! window.confirm( "以下の" + lineArray.length.toString() + "個のURLを開きますか？\n\n" + displayURL ) ){
		// キャンセル後、フォーカスが外れているので戻しておく
		document.editForm.editTextarea.focus();
		return;
	}
	// 開く
	for( var i=0; i < lineArray.length; i++ ){
		window.open( lineArray[i], "_blank" );
	}
}

/*--------------------------------------------------

*/
function insertToCharacters(){
	var insertString = prompt("追加する文字を指定して下さい", "　");
	if( insertString == null ){
		document.editForm.editTextarea.focus();
		return;
	}
	var lineArray = document.editForm.editTextarea.value.split("\n");
	var setString = "";
	for(var li=0; li < lineArray.length; li++){
		var lineString = lineArray[li];
		var newLineStr = "";
		for(var ci=0; ci < lineString.length; ci++){
			newLineStr += (ci<=0 ? "" : insertString) + lineString.charAt(ci);
		}
		
		if(li + 1 < lineArray.length){
			setString += newLineStr + "\n";
		}else{
			setString += newLineStr;
		}
	}
	setEditTextareaValue(setString);
}
/*--------------------------------------------------
	文字ソート
*/
function sortCharacters(){
	var lineArray = document.editForm.editTextarea.value.split("\n");
	var setString = "";
	for( var li=0; li < lineArray.length; li++ ){
		var lineString = lineArray[li];
		var charArray = new Array();
		
		for( var ci=0; ci < lineString.length; ci++ ){
			charArray[ci] = lineString.charAt(ci);
		}
		charArray.sort();
		
		lineString = "";
		for( var ci=0; ci < charArray.length; ci++ ){
			lineString += charArray[ci];
		}
		if( li + 1 < lineArray.length ){
			setString += lineString + "\n";
		}else{
			setString += lineString;
		}
	}
	setEditTextareaValue(setString);
}
